- name: "STIG UBTU-24-200640: Deploy DoD Banner File"
  ansible.builtin.template:
    src: templates/issue.net.j2
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'
  notify: Restart sshd

- name: "UBTU-24-200640: Remove the /etc/issue file"
  ansible.builtin.file:
    path: /etc/issue
    state: absent
  notify: Restart sshd
