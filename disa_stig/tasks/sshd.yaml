- name: Deploy SSH Daemon STIG config
  ansible.builtin.template:
    src: templates/sshd/sshd_config.stig.conf.j2
    dest: /etc/ssh/sshd_config.d/01-stig.conf
    owner: root
    group: root
    mode: '0644'
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Deploy SSH Client STIG config
  ansible.builtin.template:
    src: templates/sshd/ssh_config.stig.conf.j2
    dest: /etc/ssh/ssh_config.d/01-stig.conf
    owner: root
    group: root
    mode: '0644'

